<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="총격과 와이어 기동을 중심으로 한 사이드 스크롤 로그라이크 웹 게임"
    >
    <title>Wirefall 로그라이크</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar" aria-label="게임 정보">
        <div>
          <p class="eyebrow">Wirefall</p>
          <h1>네온 아래로 떨어지는 총격 로그라이크</h1>
        </div>
        <button class="command-button ghost" id="restartTop" type="button">재시작</button>
      </header>

      <section class="stage-card" aria-label="게임 화면">
        <canvas id="game" width="1280" height="720" tabindex="0" aria-label="Wirefall 게임 캔버스"></canvas>

        <div class="hud" aria-live="polite">
          <span class="telemetry"><b id="hpText">HP 100</b><small>체력</small></span>
          <span class="telemetry"><b id="sectorText">섹터 1</b><small>진행</small></span>
          <span class="telemetry"><b id="scoreText">0</b><small>점수</small></span>
          <span class="telemetry"><b id="heatText">안정</b><small>총열</small></span>
        </div>

        <div class="overlay-panel is-visible" id="startPanel">
          <p class="eyebrow">side-scroll roguelike</p>
          <h2>쏘고, 걸고, 살아남아라</h2>
          <p>
            마우스로 조준하고 좌클릭으로 사격합니다. 천장 노드에 우클릭 또는 E를 눌러 와이어를 걸면
            빠르게 끌려갑니다. 섹터를 정리할 때마다 무작위 강화 하나를 고르세요.
          </p>
          <button class="command-button primary" id="startButton" type="button">작전 시작</button>
        </div>

        <div class="overlay-panel upgrade-panel" id="upgradePanel" hidden>
          <p class="eyebrow">sector clear</p>
          <h2>강화 선택</h2>
          <div class="upgrade-grid" id="upgradeGrid"></div>
        </div>

        <div class="overlay-panel" id="gameOverPanel" hidden>
          <p class="eyebrow">run failed</p>
          <h2>작전 종료</h2>
          <p id="finalText">최종 점수 0</p>
          <button class="command-button primary" id="restartButton" type="button">다시 도전</button>
        </div>
      </section>

      <footer class="control-strip">
        <span>A/D 또는 방향키: 이동</span>
        <span>Space/W: 점프</span>
        <span>좌클릭/J: 사격</span>
        <span>우클릭/E: 와이어</span>
        <span>1-3: 강화 선택</span>
      </footer>
    </main>
    <script type="module" src="./src/game.js?v=6"></script>
  </body>
</html>
